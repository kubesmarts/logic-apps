# FluentBit Parsers Configuration
#
# Parsers for CloudEvents and workflow runtime logs

# =============================================================================
# JSON Parser for CloudEvents
# =============================================================================

[PARSER]
    Name        json
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%LZ
    Time_Keep   On

    # Decode field types
    Decode_Field_As json cloudEvent

[PARSER]
    Name        cloudevents
    Format      json
    Time_Key    cloudEvent.time
    Time_Format %Y-%m-%dT%H:%M:%S.%LZ
    Time_Keep   On

# =============================================================================
# Regex Parser for Quarkus Logs (if CloudEvents embedded in logs)
# =============================================================================

[PARSER]
    Name        quarkus
    Format      regex
    Regex       ^(?<time>[^ ]+) (?<level>[^ ]+) +\[(?<logger>[^\]]+)\] \((?<thread>[^)]+)\) (?<message>.*)$
    Time_Key    time
    Time_Format %Y-%m-%d %H:%M:%S,%L
    Time_Keep   On

# =============================================================================
# Docker JSON Parser (for Docker container logs)
# =============================================================================

[PARSER]
    Name        docker
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%LZ
    Time_Keep   On

    # Docker wraps logs in "log" field
    Decode_Field_As json log

# =============================================================================
# Kubernetes Parser (for K8s pod logs)
# =============================================================================

[PARSER]
    Name        kubernetes
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%LZ
    Time_Keep   On

    # Kubernetes metadata
    Decode_Field_As json kubernetes

# =============================================================================
# Multiline Parser for Java Stack Traces
# =============================================================================

[MULTILINE_PARSER]
    Name          java_multiline
    Type          regex
    Flush_timeout 1000

    # Java exception pattern
    rule      "start_state"  "/(^[0-9]{4}-[0-9]{2}-[0-9]{2}\s+[0-9]{2}:[0-9]{2}:[0-9]{2})/"  "cont"
    rule      "cont"         "/(^\s+at\s|^\s+\.{3}\s|^Caused by:)/"                         "cont"
