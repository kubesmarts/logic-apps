# FluentBit Configuration for Elasticsearch Mode (Data Index Mode 2)
#
# This configuration captures workflow/task CloudEvents from runtime logs
# and ships them directly to Elasticsearch raw events index.
#
# Architecture Flow:
#   Workflow Runtime (logs) → FluentBit → Elasticsearch (workflow-events-raw)
#                                                ↓
#                                          ES Transform (automatic)
#                                                ↓
#                                    Normalized Indices → GraphQL API

[SERVICE]
    # Flush interval (seconds)
    Flush        5

    # Daemon mode (Off for Docker/K8s)
    Daemon       Off

    # Log level (error, warning, info, debug, trace)
    Log_Level    info

    # Parsers file
    Parsers_File parsers.conf

    # HTTP server for metrics/monitoring
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020

    # Storage buffering (recommended for production)
    storage.path              /var/log/fluentbit-storage/
    storage.sync              normal
    storage.checksum          off
    storage.max_chunks_up     128
    storage.backlog.mem_limit 5M

# =============================================================================
# INPUT: Capture logs from workflow runtime
# =============================================================================

[INPUT]
    Name              tail
    Tag               workflow.events.*
    Path              /var/log/workflows/*.log
    Path_Key          filepath
    Parser            json
    DB                /var/log/fluentbit-workflow-tail.db
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On
    Refresh_Interval  10

    # Read from end of file (for new deployments)
    # Set to Off to read from beginning (for backfilling)
    Read_from_Head    Off

# Alternative: Read from Docker container logs
# [INPUT]
#     Name              forward
#     Tag               workflow.events.*
#     Listen            0.0.0.0
#     Port              24224
#     Buffer_Chunk_Size 1M
#     Buffer_Max_Size   6M

# Alternative: Read from systemd journal
# [INPUT]
#     Name            systemd
#     Tag             workflow.events.*
#     Path            /var/log/journal
#     Read_From_Tail  On
#     Systemd_Filter  _SYSTEMD_UNIT=workflow-runtime.service

# =============================================================================
# FILTER: Parse and enrich CloudEvents
# =============================================================================

[FILTER]
    Name    parser
    Match   workflow.events.*
    Key_Name log
    Parser  cloudevents
    Reserve_Data On
    Preserve_Key On

[FILTER]
    Name    modify
    Match   workflow.events.*

    # Add timestamp if not present
    Add @timestamp ${TIMESTAMP}

    # Add metadata
    Add _fluent_host ${HOSTNAME}
    Add _fluent_tag ${TAG}

# Lua script for advanced filtering/transformation (optional)
# [FILTER]
#     Name    lua
#     Match   workflow.events.*
#     Script  cloudevents-filter.lua
#     Call    enrich_cloudevent

# =============================================================================
# FILTER: Exclude non-workflow events (optional)
# =============================================================================

[FILTER]
    Name    grep
    Match   workflow.events.*
    Regex   cloudEvent.type ^(workflow|task)\.(started|completed|faulted|error)$

# =============================================================================
# OUTPUT: Send to Elasticsearch raw events index
# =============================================================================

[OUTPUT]
    Name            es
    Match           workflow.events.*

    # Elasticsearch connection
    Host            ${ES_HOST:elasticsearch}
    Port            ${ES_PORT:9200}

    # Authentication (if enabled)
    HTTP_User       ${ES_USER}
    HTTP_Passwd     ${ES_PASSWORD}

    # TLS/SSL (if enabled)
    tls             ${ES_TLS:Off}
    tls.verify      ${ES_TLS_VERIFY:On}
    # tls.ca_file     /etc/ssl/certs/ca-certificates.crt

    # Index configuration
    Index           workflow-events-raw
    Type            _doc

    # Suppress _type field (ES 7.x+)
    Suppress_Type_Name On

    # Generate _id from CloudEvent ID (idempotency)
    Generate_ID     On
    Id_Key          cloudEvent.id

    # Buffering and retry
    Retry_Limit     5

    # Bulk API settings
    Buffer_Size     5MB

    # Performance tuning
    Workers         2

    # Include tag in output (for debugging)
    Include_Tag_Key On
    Tag_Key         _tag

    # Timestamp handling
    Time_Key        @timestamp
    Time_Key_Format %Y-%m-%dT%H:%M:%S.%LZ

    # Replace dots in field names with underscores (ES limitation)
    Replace_Dots    On

    # Trace errors (for debugging)
    Trace_Error     On
    Trace_Output    On

# Alternative: Send to multiple Elasticsearch clusters (HA)
# [OUTPUT]
#     Name            es
#     Match           workflow.events.*
#     Host            elasticsearch-cluster-2
#     Port            9200
#     Index           workflow-events-raw
#     ...

# =============================================================================
# OUTPUT: Dead letter queue for failed events (optional)
# =============================================================================

[OUTPUT]
    Name            file
    Match           workflow.events.*

    # Write failed events to file for manual inspection
    Path            /var/log/fluentbit-dlq
    Format          json

    # Only write on Elasticsearch output failure
    # Requires: Retry_Limit reached on ES output
