# Elasticsearch Test Profile Configuration
#
# This profile is used for integration testing with Testcontainers.
# Quarkus Dev Services automatically starts an Elasticsearch container.
#
# No additional dependencies needed - Dev Services are included with
# quarkus-elasticsearch-java-client (already in main dependencies)

# Elasticsearch Dev Services - auto-starts Elasticsearch in Docker for tests
quarkus.elasticsearch.devservices.enabled=true
quarkus.elasticsearch.devservices.image-name=docker.elastic.co/elasticsearch/elasticsearch:8.11.1
quarkus.elasticsearch.devservices.port=9200

# Don't set hosts - let Dev Services handle it
# quarkus.elasticsearch.hosts will be set automatically by Dev Services

# Elasticsearch configuration for tests
data-index.elasticsearch.workflow-instance-index=test-workflow-instances
data-index.elasticsearch.task-execution-index=test-task-executions
data-index.elasticsearch.refresh-policy=true
data-index.elasticsearch.auto-create-indices=false
data-index.elasticsearch.number-of-shards=1
data-index.elasticsearch.number-of-replicas=0

# Schema initialization - ENABLED for tests
# Ensures indices, transforms, and ILM policies are created before tests run
# Note: Schema initialization will be tested in Task 9
data-index.storage.skip-init-schema=false

# Logging for tests - DEBUG level for troubleshooting
quarkus.log.category."org.kubesmarts.logic.dataindex".level=DEBUG
quarkus.log.category."org.kubesmarts.logic.dataindex.storage.elasticsearch".level=DEBUG
quarkus.log.category."org.kubesmarts.logic.dataindex.storage.elasticsearch.schema".level=DEBUG
quarkus.log.category."co.elastic.clients".level=INFO

# HTTP configuration for tests
quarkus.http.test-port=0
quarkus.http.test-ssl-port=0
