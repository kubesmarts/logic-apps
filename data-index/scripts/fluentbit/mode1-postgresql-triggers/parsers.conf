# ============================================================================
# FluentBit Parsers Configuration
# ============================================================================

# Docker/Kubernetes container log format parser
# Parses: {"log":"<message>\n","stream":"stdout","time":"2026-04-23T..."}
[PARSER]
    Name   docker
    Format json
    Time_Key time
    Time_Format %Y-%m-%dT%H:%M:%S.%LZ
    Time_Keep On
    Decode_Field_As escaped log

# CRI container log format parser (containerd/CRI-O)
# Parses: 2026-04-23T23:07:15.123456Z stdout F <message>
[PARSER]
    Name   cri
    Format regex
    Regex  ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
    Time_Key time
    Time_Format %Y-%m-%dT%H:%M:%S.%LZ
    Time_Keep On

# JSON parser for nested log field
[PARSER]
    Name   json
    Format json
    Time_Key time
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    Time_Keep Off
