# ============================================================================
# FluentBit Configuration - Mode 1: PostgreSQL Polling
# ============================================================================
#
# Purpose: Capture Quarkus Flow structured logs and write directly to PostgreSQL
#
# Pipeline:
#   Container stdout/stderr → FluentBit tail → Parse JSON → Flatten →
#   Route by event type → PostgreSQL INSERT/UPDATE
#
# ============================================================================

[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020
    storage.metrics  on

# ============================================================================
# INPUT: Tail Kubernetes container logs
# ============================================================================
#
# Tails logs from /var/log/containers/*workflow*.log
# Adjust path pattern to match your workflow pod naming convention
#
[INPUT]
    Name              tail
    Path              /var/log/containers/*_workflows_*.log
    Parser            docker
    Tag               kube.*
    Refresh_Interval  5
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On
    DB                /tail-db/fluent-bit-tail.db

# ============================================================================
# FILTER: Extract Kubernetes metadata
# ============================================================================
[FILTER]
    Name                kubernetes
    Match               kube.*
    Kube_URL            https://kubernetes.default.svc:443
    Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
    Kube_Tag_Prefix     kube.var.log.containers.
    Merge_Log           On
    Keep_Log            Off
    K8S-Logging.Parser  On
    K8S-Logging.Exclude On
    Labels              On
    Annotations         Off

# ============================================================================
# FILTER: Parse JSON log message
# ============================================================================
[FILTER]
    Name   parser
    Match  kube.*
    Key_Name log
    Parser json
    Reserve_Data On

# ============================================================================
# FILTER: Only keep Serverless Workflow events
# ============================================================================
[FILTER]
    Name   grep
    Match  kube.*
    Regex  eventType ^io\.serverlessworkflow\.(workflow|task)\.

# ============================================================================
# FILTER: Flatten nested JSON fields for PostgreSQL compatibility
# ============================================================================
#
# Transforms:
#   - error.type → error_type
#   - error.title → error_title
#   - Preserves JSONB fields (input, output, inputArgs, outputArgs)
#
[FILTER]
    Name    lua
    Match   kube.*
    script  /fluent-bit/etc/flatten-event.lua
    call    flatten_event

# ============================================================================
# FILTER: Route workflow.started events
# ============================================================================
[FILTER]
    Name          rewrite_tag
    Match         kube.*
    Rule          $eventType ^io\.serverlessworkflow\.workflow\.started\.v1$ workflow.instance.started false
    Emitter_Mem_Buf_Limit 10M

# ============================================================================
# FILTER: Route workflow.completed events
# ============================================================================
[FILTER]
    Name          rewrite_tag
    Match         kube.*
    Rule          $eventType ^io\.serverlessworkflow\.workflow\.completed\.v1$ workflow.instance.completed false
    Emitter_Mem_Buf_Limit 10M

# ============================================================================
# FILTER: Route workflow.faulted events
# ============================================================================
[FILTER]
    Name          rewrite_tag
    Match         kube.*
    Rule          $eventType ^io\.serverlessworkflow\.workflow\.faulted\.v1$ workflow.instance.faulted false
    Emitter_Mem_Buf_Limit 10M

# ============================================================================
# FILTER: Route workflow.cancelled events
# ============================================================================
[FILTER]
    Name          rewrite_tag
    Match         kube.*
    Rule          $eventType ^io\.serverlessworkflow\.workflow\.cancelled\.v1$ workflow.instance.cancelled false
    Emitter_Mem_Buf_Limit 10M

# ============================================================================
# FILTER: Route workflow.suspended events
# ============================================================================
[FILTER]
    Name          rewrite_tag
    Match         kube.*
    Rule          $eventType ^io\.serverlessworkflow\.workflow\.suspended\.v1$ workflow.instance.suspended false
    Emitter_Mem_Buf_Limit 10M

# ============================================================================
# FILTER: Route workflow.resumed events
# ============================================================================
[FILTER]
    Name          rewrite_tag
    Match         kube.*
    Rule          $eventType ^io\.serverlessworkflow\.workflow\.resumed\.v1$ workflow.instance.resumed false
    Emitter_Mem_Buf_Limit 10M

# ============================================================================
# FILTER: Route workflow.status-changed events
# ============================================================================
[FILTER]
    Name          rewrite_tag
    Match         kube.*
    Rule          $eventType ^io\.serverlessworkflow\.workflow\.status-changed\.v1$ workflow.instance.status-changed false
    Emitter_Mem_Buf_Limit 10M

# ============================================================================
# FILTER: Route task.started events
# ============================================================================
[FILTER]
    Name          rewrite_tag
    Match         kube.*
    Rule          $eventType ^io\.serverlessworkflow\.task\.started\.v1$ workflow.task.started false
    Emitter_Mem_Buf_Limit 10M

# ============================================================================
# FILTER: Route task.completed events
# ============================================================================
[FILTER]
    Name          rewrite_tag
    Match         kube.*
    Rule          $eventType ^io\.serverlessworkflow\.task\.completed\.v1$ workflow.task.completed false
    Emitter_Mem_Buf_Limit 10M

# ============================================================================
# FILTER: Route task.faulted events
# ============================================================================
[FILTER]
    Name          rewrite_tag
    Match         kube.*
    Rule          $eventType ^io\.serverlessworkflow\.task\.faulted\.v1$ workflow.task.faulted false
    Emitter_Mem_Buf_Limit 10M

# ============================================================================
# OUTPUT: workflow.instance.started → INSERT workflow_instances
# ============================================================================
[OUTPUT]
    Name            pgsql
    Match           workflow.instance.started
    Host            ${POSTGRES_HOST}
    Port            ${POSTGRES_PORT}
    Database        ${POSTGRES_DB}
    User            ${POSTGRES_USER}
    Password        ${POSTGRES_PASSWORD}
    Table           workflow_instances
    Timestamp_Key   timestamp
    Async           Off
    Retry_Limit     5
    # Note: FluentBit pgsql plugin doesn't support custom SQL, so we need to use exec output
    # This is a limitation - consider using HTTP output to a sidecar that does the UPSERT

# ============================================================================
# OUTPUT: workflow.instance.completed → UPDATE workflow_instances
# ============================================================================
[OUTPUT]
    Name            pgsql
    Match           workflow.instance.completed
    Host            ${POSTGRES_HOST}
    Port            ${POSTGRES_PORT}
    Database        ${POSTGRES_DB}
    User            ${POSTGRES_USER}
    Password        ${POSTGRES_PASSWORD}
    Table           workflow_instances
    Timestamp_Key   timestamp
    Async           Off
    Retry_Limit     5

# ============================================================================
# OUTPUT: workflow.task.started → INSERT task_executions
# ============================================================================
[OUTPUT]
    Name            pgsql
    Match           workflow.task.started
    Host            ${POSTGRES_HOST}
    Port            ${POSTGRES_PORT}
    Database        ${POSTGRES_DB}
    User            ${POSTGRES_USER}
    Password        ${POSTGRES_PASSWORD}
    Table           task_executions
    Timestamp_Key   timestamp
    Async           Off
    Retry_Limit     5

# ============================================================================
# OUTPUT: Debug - stdout (enable for troubleshooting)
# ============================================================================
# Uncomment to see parsed events in FluentBit logs
#
# [OUTPUT]
#     Name   stdout
#     Match  workflow.*
#     Format json_lines
