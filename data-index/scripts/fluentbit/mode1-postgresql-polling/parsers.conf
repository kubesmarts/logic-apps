# ============================================================================
# FluentBit Parsers - Mode 1: PostgreSQL Polling
# ============================================================================

# ============================================================================
# Docker JSON parser
# ============================================================================
# Kubernetes container logs are in Docker JSON format:
# {"log":"actual log message","stream":"stdout","time":"2026-04-21T..."}
#
[PARSER]
    Name   docker
    Format json
    Time_Key time
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep On

# ============================================================================
# Quarkus Flow JSON Event parser
# ============================================================================
# Parses the actual Quarkus Flow structured logging event
# After docker parser extracts the "log" field, this parses it as JSON
#
[PARSER]
    Name   json
    Format json
    Time_Key timestamp
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep On
