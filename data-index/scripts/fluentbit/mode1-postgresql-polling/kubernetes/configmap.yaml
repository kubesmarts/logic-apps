---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: fluent-bit
  labels:
    app: fluent-bit
    mode: postgresql-polling
data:
  fluent-bit.conf: |
    # FluentBit Configuration - Mode 1: PostgreSQL Polling
    # Simplified version using stdout output + sidecar processor

    [SERVICE]
        Flush        5
        Daemon       Off
        Log_Level    info
        Parsers_File parsers.conf
        HTTP_Server  On
        HTTP_Listen  0.0.0.0
        HTTP_Port    2020

    # INPUT: Tail Kubernetes container logs
    [INPUT]
        Name              tail
        Path              /var/log/containers/*_*_workflow-*.log
        Parser            docker
        Tag               kube.*
        Refresh_Interval  5
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On
        DB                /var/log/fluent-bit-tail.db

    # FILTER: Extract Kubernetes metadata
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On
        Labels              On
        Annotations         Off

    # FILTER: Parse JSON log message
    [FILTER]
        Name   parser
        Match  kube.*
        Key_Name log
        Parser json
        Reserve_Data On

    # FILTER: Only keep Serverless Workflow events
    [FILTER]
        Name   grep
        Match  kube.*
        Regex  eventType ^io\.serverlessworkflow\.(workflow|task)\.

    # FILTER: Flatten nested JSON fields
    [FILTER]
        Name    lua
        Match   kube.*
        script  /fluent-bit/etc/flatten-event.lua
        call    flatten_event

    # OUTPUT: Forward to HTTP ingestion service (handles PostgreSQL UPSERT logic)
    [OUTPUT]
        Name   http
        Match  kube.*
        Host   data-index-ingestion.data-index.svc.cluster.local
        Port   8081
        URI    /ingest
        Format json
        Retry_Limit 5

  parsers.conf: |
    # Docker JSON parser
    [PARSER]
        Name   docker
        Format json
        Time_Key time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
        Time_Keep On

    # Quarkus Flow JSON Event parser
    [PARSER]
        Name   json
        Format json
        Time_Key timestamp
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
        Time_Keep On

  flatten-event.lua: |
    -- Flatten nested JSON fields for PostgreSQL compatibility
    --
    -- Transforms:
    --   error.type → error_type
    --   error.title → error_title
    --   error.detail → error_detail
    --   error.status → error_status
    --   error.instance → error_instance
    --
    -- Preserves JSONB fields: input, output, inputArgs, outputArgs

    function flatten_event(tag, timestamp, record)
        local new_record = {}

        -- Copy all top-level fields
        for k, v in pairs(record) do
            new_record[k] = v
        end

        -- Flatten error object if present
        if record.error then
            if type(record.error) == "table" then
                new_record.error_type = record.error.type
                new_record.error_title = record.error.title
                new_record.error_detail = record.error.detail
                new_record.error_status = record.error.status
                new_record.error_instance = record.error.instance
            end
            -- Remove nested error object
            new_record.error = nil
        end

        -- Convert input/output to JSON strings if they're tables
        -- PostgreSQL JSONB column expects string
        if record.input and type(record.input) == "table" then
            new_record.input_json = record.input
        end

        if record.output and type(record.output) == "table" then
            new_record.output_json = record.output
        end

        if record.inputArgs and type(record.inputArgs) == "table" then
            new_record.input_args_json = record.inputArgs
        end

        if record.outputArgs and type(record.outputArgs) == "table" then
            new_record.output_args_json = record.outputArgs
        end

        return 2, timestamp, new_record
    end
