# ============================================================================
# FluentBit Configuration - Mode 2: Elasticsearch Transform-based Normalization
# ============================================================================
#
# Purpose: Capture Quarkus Flow structured logs from container stdout
#          Elasticsearch Transform aggregates raw events into normalized indices
#
# Pipeline:
#   Quarkus Flow → stdout → K8s /var/log/containers/ → FluentBit tail →
#   Parse container logs → Filter JSON events → Route by event type →
#   Elasticsearch INSERT (raw indices) → Elasticsearch Transform → Normalized indices
#
# ============================================================================

[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020
    storage.metrics  on

# ============================================================================
# INPUT: Tail Kubernetes container logs from workflow namespace
# ============================================================================
#
# Kubernetes captures container stdout/stderr to /var/log/containers/
# Format: /var/log/containers/<pod>_<namespace>_<container>-<id>.log
#
# Each line format (Docker runtime):
#   {"log":"<actual log line>\n","stream":"stdout","time":"2026-04-23T..."}
#
# Or (CRI runtime like containerd):
#   2026-04-23T... stdout F <actual log line>
#
# We tail workflow namespace pods only, then parse container format,
# then extract JSON structured events (which have "eventType" field)
#
# NOTE: WORKFLOW_NAMESPACE env var set in DaemonSet (default: workflows)
#
[INPUT]
    Name              tail
    Path              /var/log/containers/*_${WORKFLOW_NAMESPACE}_*.log
    Parser            cri
    Tag               kube.*
    Refresh_Interval  5
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   Off
    DB                /tail-db/fluent-bit-kube.db
    Read_from_Head    On

# ============================================================================
# FILTER: Parse nested JSON from container log line
# ============================================================================
#
# After CRI parser extracts "log" field, parse it as JSON
# Only lines that are valid JSON with "eventType" field are structured events
# Regular app logs: "22:51:50 INFO [class] message" → not JSON, filtered out later
# Structured events: {"instanceId":"...","eventType":"..."} → valid JSON, kept
#
[FILTER]
    Name              parser
    Match             kube.*
    Key_Name          log
    Parser            json
    Reserve_Data      On
    Preserve_Key      Off

# ============================================================================
# FILTER: Keep only structured events (exclude regular app logs)
# ============================================================================
#
# Structured events have "eventType" field
# Regular app logs don't have this field, so they're excluded
#
[FILTER]
    Name              grep
    Match             kube.*
    Regex             eventType ^io\.serverlessworkflow\.

# ============================================================================
# FILTER: Add Kubernetes metadata (pod, namespace, labels, annotations)
# ============================================================================
[FILTER]
    Name                kubernetes
    Match               kube.*
    Kube_URL            https://kubernetes.default.svc:443
    Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
    Kube_Tag_Prefix     kube.var.log.containers.
    Merge_Log           Off
    Keep_Log            Off
    K8S-Logging.Parser  On
    K8S-Logging.Exclude On
    Labels              On
    Annotations         Off

# ============================================================================
# FILTER: Add metadata for routing
# ============================================================================
[FILTER]
    Name          modify
    Match         kube.*
    Add           _flow_event true
    Copy          kubernetes.pod_name pod_name
    Copy          kubernetes.namespace_name namespace

# ============================================================================
# FILTER: Route to flow.events for further processing
# ============================================================================
[FILTER]
    Name          rewrite_tag
    Match         kube.*
    Rule          $_flow_event ^true$ flow.events false
    Emitter_Mem_Buf_Limit 10M

# ============================================================================
# FILTER: Route workflow events
# ============================================================================
[FILTER]
    Name          rewrite_tag
    Match         flow.events
    Rule          $eventType ^io\.serverlessworkflow\.workflow\. workflow.instance false
    Emitter_Mem_Buf_Limit 10M

# ============================================================================
# FILTER: Route task events
# ============================================================================
[FILTER]
    Name          rewrite_tag
    Match         flow.events
    Rule          $eventType ^io\.serverlessworkflow\.task\. workflow.task false
    Emitter_Mem_Buf_Limit 10M

# ============================================================================
# OUTPUT: Workflow events → workflow-instance-events-raw-YYYY.MM.DD index
# ============================================================================
#
# FluentBit ES output stores complete event in Elasticsearch
# Index pattern uses date-based rollover for ILM management
# Elasticsearch Transform will aggregate these into workflow-instances index
#
[OUTPUT]
    Name            es
    Match           workflow.instance
    Host            ${ELASTICSEARCH_HOST}
    Port            ${ELASTICSEARCH_PORT}
    Index           workflow-instance-events-raw
    Type            _doc
    Logstash_Format On
    Logstash_Prefix workflow-instance-events-raw
    Logstash_DateFormat %Y.%m.%d
    Retry_Limit     5
    Suppress_Type_Name On
    tls             ${ELASTICSEARCH_TLS}
    tls.verify      ${ELASTICSEARCH_TLS_VERIFY}

# ============================================================================
# OUTPUT: Task events → task-execution-events-raw-YYYY.MM.DD index
# ============================================================================
#
# Elasticsearch Transform will aggregate these into task-executions index
#
[OUTPUT]
    Name            es
    Match           workflow.task
    Host            ${ELASTICSEARCH_HOST}
    Port            ${ELASTICSEARCH_PORT}
    Index           task-execution-events-raw
    Type            _doc
    Logstash_Format On
    Logstash_Prefix task-execution-events-raw
    Logstash_DateFormat %Y.%m.%d
    Retry_Limit     5
    Suppress_Type_Name On
    tls             ${ELASTICSEARCH_TLS}
    tls.verify      ${ELASTICSEARCH_TLS_VERIFY}

# ============================================================================
# OUTPUT: Debug - stdout for verification
# ============================================================================
[OUTPUT]
    Name   stdout
    Match  workflow.*
    Format json_lines
