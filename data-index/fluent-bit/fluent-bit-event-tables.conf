# ============================================================================
# FluentBit Configuration - Event Tables Ingestion
# ============================================================================
#
# Purpose: Tail Quarkus Flow structured logs, flatten JSON, write to event tables
#
# Pipeline:
#   Quarkus Flow logs → FluentBit tail → Lua filter (flatten) → PostgreSQL event tables
#
# Key Features:
# - Flattens nested JSON into structured columns (NOT JSONB staging)
# - Separate routes for workflow vs task events
# - Direct INSERT into event tables (no UPSERT logic)
# - FluentBit handles retries, buffering, failures
#
# ============================================================================

[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

# ============================================================================
# INPUT: Tail Quarkus Flow Structured Logging Events
# ============================================================================
#
# Quarkus Flow writes JSON events to target/quarkus-flow-events.log
# Each line is a complete JSON object (one event)
#
[INPUT]
    Name              tail
    Path              /var/log/quarkus-flow/workflow-events.log
    Parser            json
    Tag               workflow.raw
    Read_from_Head    true
    Refresh_Interval  1
    DB                /var/log/quarkus-flow/fluent-bit-tail.db

# ============================================================================
# FILTER: Route to Workflow Instance Events
# ============================================================================
#
# Match events containing "workflow.instance" or "workflow.workflow"
# (Different Quarkus Flow versions use different event names)
#
[FILTER]
    Name    grep
    Match   workflow.raw
    Regex   eventType \.workflow\.(started|completed|faulted)\.

# ============================================================================
# FILTER: Flatten Workflow Events
# ============================================================================
#
# Transform nested JSON into flat structure for event table:
# - workflowNamespace → workflow_namespace
# - input (JSONB) → input_data
# - error.type → error_type
#
[FILTER]
    Name    lua
    Match   workflow.raw
    Script  flatten-to-columns.lua
    Call    flatten_workflow_event

# ============================================================================
# FILTER: Retag Workflow Events
# ============================================================================
#
# Change tag to workflow.instance for routing to correct output
#
[FILTER]
    Name    rewrite_tag
    Match   workflow.raw
    Rule    $event_type ^(started|completed|faulted)$ workflow.instance false
    Emitter_Mem_Buf_Limit 10M

# ============================================================================
# INPUT: Tail Task Events (Same Source, Different Processing)
# ============================================================================
#
# We need a second input to process task events separately
# This is a limitation of FluentBit - can't branch one input into two filters
#
[INPUT]
    Name              tail
    Path              /var/log/quarkus-flow/workflow-events.log
    Parser            json
    Tag               task.raw
    Read_from_Head    true
    Refresh_Interval  1
    DB                /var/log/quarkus-flow/fluent-bit-tail-tasks.db

# ============================================================================
# FILTER: Route to Task Events
# ============================================================================
#
# Match events containing "task."
#
[FILTER]
    Name    grep
    Match   task.raw
    Regex   eventType \.task\.(started|completed|faulted)\.

# ============================================================================
# FILTER: Flatten Task Events
# ============================================================================
#
[FILTER]
    Name    lua
    Match   task.raw
    Script  flatten-to-columns.lua
    Call    flatten_task_event

# ============================================================================
# FILTER: Retag Task Events
# ============================================================================
#
[FILTER]
    Name    rewrite_tag
    Match   task.raw
    Rule    $event_type ^(started|completed|faulted)$ task.execution false
    Emitter_Mem_Buf_Limit 10M

# ============================================================================
# OUTPUT: Workflow Instance Events → PostgreSQL
# ============================================================================
#
# FluentBit automatically maps flattened record fields to table columns
# - instance_id → instance_id column
# - workflow_name → workflow_name column
# - input_data (JSON) → input_data JSONB column
#
[OUTPUT]
    Name            pgsql
    Match           workflow.instance
    Host            ${POSTGRES_HOST}
    Port            ${POSTGRES_PORT}
    User            ${POSTGRES_USER}
    Password        ${POSTGRES_PASSWORD}
    Database        ${POSTGRES_DATABASE}
    Table           workflow_instance_events
    Timestamp_Key   event_time
    Async           Off
    # Retry configuration
    Retry_Limit     5

# ============================================================================
# OUTPUT: Task Execution Events → PostgreSQL
# ============================================================================
#
[OUTPUT]
    Name            pgsql
    Match           task.execution
    Host            ${POSTGRES_HOST}
    Port            ${POSTGRES_PORT}
    User            ${POSTGRES_USER}
    Password        ${POSTGRES_PASSWORD}
    Database        ${POSTGRES_DATABASE}
    Table           task_execution_events
    Timestamp_Key   event_time
    Async           Off
    Retry_Limit     5

# ============================================================================
# OUTPUT: Debug - Print to Stdout (Optional)
# ============================================================================
#
# Enable for debugging - see flattened events in FluentBit logs
#
# [OUTPUT]
#     Name   stdout
#     Match  workflow.*
#     Format json_lines

# ============================================================================
# Environment Variables
# ============================================================================
#
# Set these in docker-compose.yml or Kubernetes ConfigMap:
#
# POSTGRES_HOST=localhost
# POSTGRES_PORT=5432
# POSTGRES_USER=dataindex
# POSTGRES_PASSWORD=dataindex
# POSTGRES_DATABASE=dataindex
#
# ============================================================================
#
# Docker Compose Example:
#
# fluent-bit:
#   image: fluent/fluent-bit:latest
#   volumes:
#     - ./fluent-bit/fluent-bit-event-tables.conf:/fluent-bit/etc/fluent-bit.conf
#     - ./fluent-bit/flatten-to-columns.lua:/fluent-bit/etc/flatten-to-columns.lua
#     - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf
#     - /tmp/quarkus-flow-logs:/var/log/quarkus-flow
#   environment:
#     - POSTGRES_HOST=postgres
#     - POSTGRES_PORT=5432
#     - POSTGRES_USER=dataindex
#     - POSTGRES_PASSWORD=dataindex
#     - POSTGRES_DATABASE=dataindex
#   depends_on:
#     - postgres
#
# ============================================================================
