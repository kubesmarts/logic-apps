# Data Index v1.0.0 - Read-Only Query Service - Core Configuration
#
# This file contains common configuration for all storage backends.
# Backend-specific configuration is in separate service modules:
#   - data-index-service-postgresql
#   - data-index-service-elasticsearch

# Application info
quarkus.application.name=data-index

# Index Jackson classes for GraphQL JsonNode support
quarkus.index-dependency.jackson-databind.group-id=com.fasterxml.jackson.core
quarkus.index-dependency.jackson-databind.artifact-id=jackson-databind

# Exclude v0.8 GraphQL and runtime client infrastructure (not needed in v1.0.0)
quarkus.arc.exclude-types=org.kie.kogito.index.graphql.**,org.kie.kogito.index.quarkus.service.api.**,org.kie.kogito.index.service.auth.**,org.kie.kogito.index.service.graphql.**,org.kie.kogito.index.vertx.**

# SmallRye GraphQL v1.0.0 API
quarkus.smallrye-graphql.root-path=/graphql
quarkus.smallrye-graphql.print-data-fetcher-exception=true
quarkus.smallrye-graphql.log-payload=queryAndVariables
quarkus.smallrye-graphql.field-visibility=DEFAULT
quarkus.smallrye-graphql.ui.always-include=true

# HTTP - serve static resources from META-INF/resources/
quarkus.http.enable-compression=true

# Health checks
quarkus.smallrye-health.root-path=/q/health

# Metrics
quarkus.micrometer.enabled=true
quarkus.micrometer.binder.jvm=true
quarkus.micrometer.export.prometheus.enabled=true

# Container image (backend modules override the name)
quarkus.container-image.build=${quarkus.build.image:true}
quarkus.jib.jvm-arguments=-Dquarkus.http.port=8080

# Schema Initialization Configuration
#
# Universal flag to disable schema initialization for ALL backends.
# When true, skips:
#   - PostgreSQL: Flyway migrations (must also set quarkus.flyway.migrate-at-start=false)
#   - Elasticsearch: ILM policies, index templates, transforms
#
# Use cases:
#   - Production: External schema management (init jobs, operators)
#   - Testing: Pre-existing schema
#   - Development: Manual schema control
#
# Default: false (schema initialization enabled)
#data-index.storage.skip-init-schema=false

# Backend-specific control (Elasticsearch only)
# When false, Elasticsearch schema initialization is disabled (if universal flag is also false).
# When true (default), Elasticsearch schema initialization follows the universal flag.
# Note: The universal flag (data-index.storage.skip-init-schema) takes precedence.
#
# Default: true (Elasticsearch schema initialization enabled)
#data-index.elasticsearch.schema.init.enabled=true

# PostgreSQL schema initialization (via Flyway)
# When using data-index.storage.skip-init-schema=true, also set this to false.
# This is controlled separately because Quarkus Flyway does not support
# programmatic runtime disabling based on custom properties.
#
# Default: true (automatically migrate at startup in dev mode)
# Production: set to false, schema managed externally
#quarkus.flyway.migrate-at-start=true
