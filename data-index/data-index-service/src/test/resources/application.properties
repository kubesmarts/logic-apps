# Test configuration

# PostgreSQL test profile
%test.kogito.apps.persistence.type=postgresql
%test.quarkus.datasource.db-kind=postgresql

# Hibernate ORM - ensure JSON mapping doesn't interfere with tests
%test.quarkus.hibernate-orm.jdbc.timezone=UTC
%test.quarkus.hibernate-orm.database.generation=none
%test.quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
%test.quarkus.hibernate-orm.mapping.format.global=ignore

# Flyway migrations for tests
%test.quarkus.flyway.migrate-at-start=true
