# Elasticsearch Storage Backend Configuration (MODE 2 - Production Ready)
#
# This module (data-index-service-elasticsearch) includes all Elasticsearch dependencies.
# No Maven profiles needed - dependencies are directly in the pom.xml.

# Container image name
quarkus.container-image.name=data-index-service-elasticsearch

# Elasticsearch Connection
# Dev Mode - Quarkus Dev Services auto-starts Elasticsearch container
%dev.quarkus.elasticsearch.devservices.enabled=true
%dev.quarkus.elasticsearch.devservices.image-name=docker.elastic.co/elasticsearch/elasticsearch:8.11.1
%dev.quarkus.elasticsearch.devservices.port=9200

# Test Mode - Use Dev Services for integration tests
%test.quarkus.elasticsearch.devservices.enabled=true
%test.quarkus.elasticsearch.devservices.image-name=docker.elastic.co/elasticsearch/elasticsearch:8.11.1

# Production - Connect to external Elasticsearch cluster
%prod.quarkus.elasticsearch.hosts=${ELASTICSEARCH_HOST:elasticsearch.elasticsearch.svc.cluster.local}:${ELASTICSEARCH_PORT:9200}
%prod.quarkus.elasticsearch.protocol=${ELASTICSEARCH_PROTOCOL:http}
%prod.quarkus.elasticsearch.username=${ELASTICSEARCH_USERNAME:}
%prod.quarkus.elasticsearch.password=${ELASTICSEARCH_PASSWORD:}

# Schema Initialization
# Enable automatic schema setup (ILM, templates, transforms) on startup
# Disable in production if schema is managed externally (init jobs, operators)
data-index.elasticsearch.schema.init.enabled=true
%prod.data-index.elasticsearch.schema.init.enabled=false

# Universal schema initialization control (applies to all backends)
# When true, disables ALL schema initialization (PostgreSQL Flyway, Elasticsearch ILM/templates/transforms)
# data-index.storage.skip-init-schema=false
