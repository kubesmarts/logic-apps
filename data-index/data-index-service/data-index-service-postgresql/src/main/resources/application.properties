# PostgreSQL Storage Backend Configuration (MODE 1 - Production Ready)
#
# This module (data-index-service-postgresql) includes all PostgreSQL dependencies.
# No Maven profiles needed - dependencies are directly in the pom.xml.
#
# Dev Mode:
#   mvn quarkus:dev
#   - Quarkus Dev Services auto-starts PostgreSQL container
#   - Flyway runs migrations from data-index-storage-migrations module
#   - Schema created automatically
#
# Production:
#   - Manual PostgreSQL configuration required (via env vars)
#   - Flyway disabled (external migration tools handle schema)

# Container image name
quarkus.container-image.name=data-index-service-postgresql

# PostgreSQL datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.additional-jdbc-properties.stringtype=unspecified

# Dev Services - auto-starts PostgreSQL in Docker for development
# Automatically disabled when quarkus.datasource.jdbc.url is set (production)
quarkus.datasource.devservices.enabled=true
quarkus.datasource.devservices.image-name=postgres:15
quarkus.datasource.devservices.db-name=dataindex
quarkus.datasource.devservices.username=dataindex
quarkus.datasource.devservices.password=dataindex123

# Production configuration
# Set these via environment variables to override Dev Services:
#   QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://db-host:5432/dataindex
#   QUARKUS_DATASOURCE_USERNAME=dataindex
#   QUARKUS_DATASOURCE_PASSWORD=***
# Connection pool settings (always applied)
quarkus.datasource.jdbc.max-size=20
quarkus.datasource.jdbc.min-size=5

# Hibernate ORM
quarkus.hibernate-orm.jdbc.timezone=UTC
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
quarkus.hibernate-orm.mapping.format.global=ignore

# Flyway - schema migrations from data-index-storage-migrations module
# Disabled by default (external tools handle migrations in deployments)
# Enabled only in dev runtime mode with Dev Services
%dev.quarkus.flyway.migrate-at-start=true
%dev.quarkus.flyway.clean-at-start=false

%test.quarkus.flyway.migrate-at-start=true

%prod.quarkus.flyway.migrate-at-start=false
