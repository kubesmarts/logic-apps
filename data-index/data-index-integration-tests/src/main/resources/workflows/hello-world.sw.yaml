document:
  dsl: '1.0.0-alpha1'
  namespace: test
  name: hello-world
  version: '1.0.0'
  description: Simple HTTP workflow for testing Data Index integration
do:
  - fetchData:
      call: http
      with:
        method: get
        endpoint: https://httpbin.org/json
  - processResponse:
      set:
        message: ${ "Received slide: " + .slideshow.title }
        author: ${ .slideshow.author }
