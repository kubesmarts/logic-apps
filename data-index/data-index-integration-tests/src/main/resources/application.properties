#
# Data Index Integration Tests - Quarkus Flow Configuration
#

# Application
quarkus.application.name=data-index-integration-tests
quarkus.http.port=8082

#
# Quarkus Flow - Structured Logging (auto-configured)
#
# When enabled, Quarkus Flow automatically creates a separate file handler
# and writes events to target/quarkus-flow-events.log (dev mode).
# No manual file handler configuration needed!
#
quarkus.flow.structured-logging.enabled=true

# Event filtering - capture all workflow and task events
quarkus.flow.structured-logging.events=workflow.*

# Payload inclusion - include workflow input/output, exclude task payloads (default)
quarkus.flow.structured-logging.include-workflow-payloads=true
quarkus.flow.structured-logging.include-task-payloads=false

# Custom file path override (optional - Quarkus Flow defaults to target/quarkus-flow-events.log)
# Keeping default for now, FluentBit will tail from target/
# quarkus.log.handler.file."FLOW_EVENTS".path=target/workflow-events.log

# Logging - Console (human-readable for debugging)
quarkus.log.console.enabled=true
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n
quarkus.log.level=INFO
quarkus.log.category."io.quarkiverse.flow".level=DEBUG

# Health checks
quarkus.smallrye-health.ui.enabled=true
