#
# Data Index Integration Tests - Quarkus Flow Configuration
#

# Application
quarkus.application.name=data-index-integration-tests
quarkus.http.port=8082

# Quarkus Flow - Enable structured logging
# This will emit workflow events in JSON format to log files
quarkus.flow.structured-logging.enabled=true

# Logging - File output (write to target directory for easy access by FluentBit)
quarkus.log.file.enable=true
quarkus.log.file.path=target/workflow-events.log
quarkus.log.file.format=%m%n
quarkus.log.file.rotation.max-file-size=10M
quarkus.log.file.rotation.max-backup-index=5

# Logging - Console (human-readable for debugging)
quarkus.log.console.enable=true
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n
quarkus.log.level=INFO
quarkus.log.category."io.quarkiverse.flow".level=DEBUG

# Health checks
quarkus.smallrye-health.ui.enable=true
