# PostgreSQL Integration Test Configuration
#
# This configuration is automatically applied to all tests in this module.
# The PostgreSQL profile is activated via maven-surefire-plugin in pom.xml.

# Index data-index-service classes for Quarkus
quarkus.index-dependency.data-index-service.group-id=org.kubesmarts.logic.apps
quarkus.index-dependency.data-index-service.artifact-id=data-index-service

# PostgreSQL backend
kogito.apps.persistence.type=postgresql
quarkus.datasource.db-kind=postgresql

# Dev Services - auto-starts PostgreSQL 15 container for tests
quarkus.datasource.devservices.enabled=true
quarkus.datasource.devservices.image-name=postgres:15
quarkus.datasource.devservices.db-name=dataindex
quarkus.datasource.devservices.username=dataindex
quarkus.datasource.devservices.password=dataindex123

# Hibernate ORM
quarkus.hibernate-orm.jdbc.timezone=UTC
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
quarkus.hibernate-orm.mapping.format.global=ignore

# Flyway - run migrations for tests
quarkus.flyway.migrate-at-start=true
quarkus.flyway.clean-at-start=false

# Logging (reduce noise in test output)
quarkus.log.category."org.hibernate".level=WARN
quarkus.log.category."io.quarkus.hibernate.orm".level=WARN
quarkus.log.category."org.flywaydb".level=INFO
